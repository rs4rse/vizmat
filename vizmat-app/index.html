<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crystal Visualizer</title>
    <style>
        canvas {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
  <link
    data-trunk rel="rust"
    href="Cargo.toml"
    data-wasm-opt="z"
    data-wasm-opt-params="--enable-bulk-memory --enable-nontrapping-float-to-int"
    data-bin="vizmat-app"
    data-cargo-no-default-features="true" />

  <h1>
      crystal brrr
  </h1>

  <canvas id="bevy-canvas">
    Javascript and support for canvas is required
  </canvas>
</body>
</html>
